services:
  db:
    image: postgres:16
    container_name: babylio_db
    environment:
      POSTGRES_USER: babylio
      POSTGRES_PASSWORD: babylio_dev
      POSTGRES_DB: babylio_dev
    ports:
      - "5432:5432"
    volumes:
      - babylio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babylio -d babylio_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: babylio_redis
    ports:
      - "6379:6379"
    volumes:
      - babylio_redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  babylio_pgdata:
  babylio_redisdata:
